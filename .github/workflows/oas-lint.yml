name: OAS Lint

on:
  pull_request:
  workflow_dispatch:

jobs:
  spectral-lint:
    name: Spectral OWASP API Security Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Spectral
        run: npm install -g @stoplight/spectral@9.12.0
      - name: Run Spectral OWASP API Security ruleset
        run: spectral lint openapi.yaml --ruleset https://raw.githubusercontent.com/stoplightio/spectral/main/rulesets/oas/owasp-api-security.json