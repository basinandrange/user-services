name: Postman collection tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  run-postman-collection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Postman CLI
        shell: bash
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
          postman --version

      - name: Authenticate Postman CLI
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          if [ -z "${POSTMAN_API_KEY}" ]; then
            echo "Missing required secret: POSTMAN_API_KEY" >&2
            exit 1
          fi
          postman login --with-api-key "${POSTMAN_API_KEY}"

      - name: Run collection (filesystem mode)
        shell: bash
        run: |
          postman collection run "postman/collections/NOVA New User Onboarding"