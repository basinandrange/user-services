  /payments/{accountNumber}/payees/add:
    post:
      summary: Add
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  payeeId:
                    type: string
              example:
                payeeId: 144826f8-43cf-4c78-a604-9f53fccec819
      tags:
        - payments/{account Number}
        - payees
    parameters:
      - name: accountNumber
        in: path
        required: true
        description: '(Required) '
        schema:
          type: string
        example: do pariatur fugiat esse
  /payments/{accountNumber}/limits:
    get:
      summary: Current
      responses:
        '500':
          description: Untitled Example
          content:
            application/json:
              schema:
                type: object
                properties:
                  daily:
                    type: integer
              example:
                daily: 30000
      tags:
        - payments/{account Number}
        - limits
    parameters:
      - name: accountNumber
        in: path
        required: true
        description: '(Required) '
        schema:
          type: string
        example: do pariatur fugiat esse
    put:
      summary: Update
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
              example:
                status: success
      tags:
        - payments/{account Number}
        - limits
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                daily:
                  type: integer
            example:
              daily: 30000
  /payments/{accountNumber}/transfer:
    post:
      summary: Transfer
      responses:
        '500':
          description: Untitled Example
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction:
                    type: string
              example:
                transaction: complete
      tags:
        - payments/{account Number}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payeeId:
                  type: string
                amount:
                  type: string
                reference:
                  type: string
                date:
                  type: string
                  format: style
            example:
              payeeId: eea58966-aff3-4631-aefe-a6247b4be10d
              amount: '184.92'
              reference: Aut id aliquid.
              date: Mon Nov 01 2021 23:21:49 GMT-0400 (Eastern Daylight Time)
    parameters:
      - name: accountNumber
        in: path
        required: true
        description: '(Required) '
        schema:
          type: string
        example: do pariatur fugiat esse
  /create:
    post:
      summary: New user
      responses:
        '200':
          description: OK
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  firstName:
                    type: string
                  lastName:
                    type: string
                  id:
                    type: string
              example:
                status: success
                firstName: Ben
                lastName: Smith
                id: 0729d37c-ef9f-4ffa-8f71-a6eedf1f95b7
      description: >-
        Creates a new user in the system. The user will be assigned an ID
        automatically. This can be found in the response.
  /get:
    get:
      summary: Get all users
      parameters:
        - name: all
          in: query
          description: '(Required) '
          schema:
            type: boolean
          example: 'true'
        - name: key
          in: header
          description: '(Required) '
          schema:
            type: string
          example: '{{key}}'
      responses:
        '200':
          description: OK
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    status:
                      type: string
              example:
                - status: success
                - firstName: Ben
                  lastName: Smith
                  id: 0729d37c-ef9f-4ffa-8f71-a6eedf1f95b7
      description: Get all users in the system.
  /update:
    put:
      summary: Update user
      parameters:
        - name: id
          in: query
          description: (Required) The user's ID (required)
          schema:
            type: string
          example: '{{id}}'
      responses:
        '200':
          description: OK
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  firstName:
                    type: string
                  lastName:
                    type: string
                  id:
                    type: string
              example:
                status: success
                firstName: Benjamin
                lastName: Smith
                id: 0729d37c-ef9f-4ffa-8f71-a6eedf1f95b7
      description: >-
        Send the keys that you'd like to update, this can be one or more of
        `firstName`, `lastName` and `password`.
    patch:
      summary: COpy user
      parameters:
        - name: id
          in: query
          required: false
          deprecated: false
          schema: {}
          example: '{{id}}'
      responses: {}
      tags:
        - payments/{account Number}
  /delete:
    delete:
      summary: Delete user
      parameters:
        - name: id
          in: query
          description: (Required) The user's ID
          schema:
            type: string
          example: '{{id}}'
      responses:
        '200':
          description: OK
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  id:
                    type: string
              example:
                status: success
                id: 0729d37c-ef9f-4ffa-8f71-a6eedf1f95b7
      description: Deletes a user from the system by `id`.
