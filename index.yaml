  /accounts/{accountNumber}/overview:
    get:
      summary: Overview
      responses:
        '200':
          description: Untitled Example
          content:
            application/json:
              schema:
                type: string
              example: |-
                {
                    "type": "Personal Loan Account",
                    "balance": {
                        "available": 632.22,
                        "present": 339.71
                    },
                    "details": {
                        "domestic": {
                            "account": "49114539",
                            "routing": "11252386"
                        },
                        "international": {
                            "bic": "GBHULVJ1",
                            "iban": "CH8572759176K0032S830"
                        }
                    },
                    "interestRate": 0.01,
                    "lastStatementDate": "Tue Nov 02 2021 10:12:14 GMT-0400 (Eastern Daylight Time)"
                }
      tags:
        - accounts
        - '{account Number}'
    parameters:
      - name: accountNumber
        in: path
        required: true
        description: '(Required) '
        schema:
          type: string
        example: do pariatur fugiat esse
  /accounts/create:
    post:
      summary: Create
      responses:
        '201':
          description: Untitled Example
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  details:
                    type: object
                    properties:
                      domestic:
                        type: object
                        properties:
                          account:
                            type: string
                            format: utc-millisec
                          routing:
                            type: string
                            format: utc-millisec
                      international:
                        type: object
                        properties:
                          bic:
                            type: string
                          iban:
                            type: string
              example:
                type: Savings Account
                details:
                  domestic:
                    account: '16088994'
                    routing: '84768721'
                  international:
                    bic: RLOOLSY1
                    iban: LB417006B8554854OI3499112308
      tags:
        - accounts
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                holder:
                  type: string
            example:
              type: Checking Account
              holder: '{{customerId}}'
