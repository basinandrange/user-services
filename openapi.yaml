openapi: 3.1.0
info:
  title: user-services
  version: 1.0.0
  description: >
    CRUD and supporting operations for the user services application.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Users
    description: User lifecycle operations
  - name: Accounts
    description: Account management for users
  - name: Payments
    description: Payment creation and queries
paths:
  /users:
    get:
      tags:
        - Users
      summary: List all users
      responses:
        '200':
          description: Array of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
        - Users
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Newly created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags:
        - Users
      summary: Get a user by ID
      responses:
        '200':
          description: Single user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags:
        - Users
      summary: Update an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Users
      summary: Remove a user
      responses:
        '204':
          description: User deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /users/{userId}/accounts:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags:
        - Accounts
      summary: List accounts for a user
      responses:
        '200':
          description: Accounts belonging to user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
        - Accounts
      summary: Create an account for the user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /users/{userId}/accounts/{accountId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
      - $ref: '#/components/parameters/AccountId'
    get:
      tags:
        - Accounts
      summary: Get a user account
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags:
        - Accounts
      summary: Update account metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdate'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Accounts
      summary: Delete a user account
      responses:
        '204':
          description: Account removed
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /payments:
    get:
      tags:
        - Payments
      summary: List recent payments
      responses:
        '200':
          description: Payments history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
        - Payments
      summary: Create a payment between accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreate'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-fA-F0-9\\-]{8,36}$'
      description: Identifier for the user
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-fA-F0-9\\-]{8,36}$'
      description: Identifier for the account
  schemas:
    User:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - customer
            - admin
        createdAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - active
            - inactive
    UserCreate:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - customer
            - admin
    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - customer
            - admin
        status:
          type: string
          enum:
            - active
            - inactive
    Account:
      type: object
      required:
        - id
        - userId
        - currency
      properties:
        id:
          type: string
        userId:
          type: string
        nickname:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
        balance:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time
    AccountCreate:
      type: object
      required:
        - userId
        - currency
      properties:
        userId:
          type: string
        nickname:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
        initialBalance:
          type: number
          format: double
          default: 0
    AccountUpdate:
      type: object
      properties:
        nickname:
          type: string
    Payment:
      type: object
      required:
        - id
        - fromAccountId
        - toAccountId
        - amount
      properties:
        id:
          type: string
        fromAccountId:
          type: string
        toAccountId:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
          minLength: 3
          maxLength: 3
        status:
          type: string
          enum:
            - pending
            - completed
            - failed
        createdAt:
          type: string
          format: date-time
    PaymentCreate:
      type: object
      required:
        - fromAccountId
        - toAccountId
        - amount
      properties:
        fromAccountId:
          type: string
        toAccountId:
          type: string
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
        description:
          type: string
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
  responses:
    NotFound:
      description: Resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                code: not_found
                message: Resource not found
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal:
              value:
                code: internal_error
                message: Unexpected error