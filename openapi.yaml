openapi: 3.0.3
info:
  title: user-services API
  version: 1.0.0
  description: Demo service for managing users, accounts, and payments.
servers:
  - url: /user-services
    description: Local express server
tags:
  - name: users
    description: Operations related to user profiles.
  - name: accounts
    description: Operations for account management.
  - name: payments
    description: Payment related operations.
paths:
  /users:
    get:
      tags:
        - users
      summary: List users
      responses:
        '200':
          description: A list of users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags:
        - users
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Created user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        description: Unique identifier for the user.
        schema:
          type: string
    get:
      tags:
        - users
      summary: Get a user by id
      responses:
        '200':
          description: User details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags:
        - users
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags:
        - users
      summary: Delete a user
      responses:
        '204':
          description: User deleted successfully.
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /accounts:
    get:
      tags:
        - accounts
      summary: List accounts
      responses:
        '200':
          description: A list of accounts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags:
        - accounts
      summary: Open a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
      responses:
        '201':
          description: Created account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /accounts/{accountId}:
    parameters:
      - name: accountId
        in: path
        required: true
        description: Unique identifier for the account.
        schema:
          type: string
    get:
      tags:
        - accounts
      summary: Get account by id
      responses:
        '200':
          description: Account details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags:
        - accounts
      summary: Update account metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdate'
      responses:
        '200':
          description: Updated account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags:
        - accounts
      summary: Close an account
      responses:
        '204':
          description: Account closed.
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /payments:
    get:
      tags:
        - payments
      summary: List payments
      responses:
        '200':
          description: A list of payments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags:
        - payments
      summary: Initiate a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreate'
      responses:
        '202':
          description: Payment accepted for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /payments/{paymentId}:
    parameters:
      - name: paymentId
        in: path
        required: true
        description: Unique identifier for the payment.
        schema:
          type: string
    get:
      tags:
        - payments
      summary: Get payment status
      responses:
        '200':
          description: Payment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: usr_123
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        status:
          type: string
          enum: [active, inactive]
          example: active
        createdAt:
          type: string
          format: date-time
          example: '2024-01-01T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-05T16:00:00Z'
      required:
        - id
        - name
        - email
        - status
    UserCreate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, inactive]
          default: active
      required:
        - name
        - email
    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, inactive]
    Account:
      type: object
      properties:
        id:
          type: string
          example: acc_456
        userId:
          type: string
          example: usr_123
        type:
          type: string
          enum: [checking, savings]
          example: checking
        balance:
          type: number
          format: double
          example: 1520.5
        currency:
          type: string
          example: USD
        status:
          type: string
          enum: [open, closed]
          example: open
        createdAt:
          type: string
          format: date-time
          example: '2024-02-01T09:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2024-02-10T10:15:00Z'
      required:
        - id
        - userId
        - type
        - balance
        - currency
        - status
    AccountCreate:
      type: object
      properties:
        userId:
          type: string
        type:
          type: string
          enum: [checking, savings]
        currency:
          type: string
          default: USD
        initialDeposit:
          type: number
          format: double
      required:
        - userId
        - type
        - currency
    AccountUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [open, closed]
        balance:
          type: number
          format: double
    Payment:
      type: object
      properties:
        id:
          type: string
          example: pay_789
        accountId:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
          example: USD
        status:
          type: string
          enum: [pending, completed, failed]
          example: pending
        scheduledAt:
          type: string
          format: date-time
          example: '2024-03-01T08:30:00Z'
        createdAt:
          type: string
          format: date-time
          example: '2024-03-01T07:45:00Z'
      required:
        - id
        - accountId
        - amount
        - currency
        - status
    PaymentCreate:
      type: object
      properties:
        accountId:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
          default: USD
        scheduledAt:
          type: string
          format: date-time
      required:
        - accountId
        - amount
        - currency
    HttpError:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer
        target:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
        - message
        - code
  responses:
    ErrorResponse:
      description: Standard error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HttpError'