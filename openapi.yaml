openapi: 3.0.3
info:
  title: user-services API
  version: 1.0.0
  description: Express service for NOVA user onboarding, accounts, and payments workflows.
servers:
  - url: http://localhost:3000
    description: Local instance
paths:
  /users:
    get:
      summary: Retrieve all users
      responses:
        '200':
          description: Array of existing users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
    post:
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Retrieve a user by identifier
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Remove a user
      responses:
        '204':
          description: User deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /accounts:
    get:
      summary: List managed accounts
      parameters:
        - name: userId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Accounts filtered by user when provided
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
  /accounts/{accountId}:
    parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Retrieve account details
      responses:
        '200':
          description: Account detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          $ref: '#/components/responses/NotFound'
  /payments:
    get:
      summary: List recent payments
      responses:
        '200':
          description: Payment history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
    post:
      summary: Schedule a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '201':
          description: Payment accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  schemas:
    UserSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
      required:
        - id
        - name
        - email
    UserDetail:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
        - type: object
          properties:
            onboardingStatus:
              type: string
            createdAt:
              type: string
              format: date-time
          required:
            - onboardingStatus
            - createdAt
    UserCreate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
      required:
        - name
        - email
    UserUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
    Account:
      type: object
      properties:
        accountId:
          type: string
        userId:
          type: string
        type:
          type: string
        status:
          type: string
        balance:
          type: number
          format: double
      required:
        - accountId
        - userId
        - type
    Payment:
      type: object
      properties:
        paymentId:
          type: string
        accountId:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - paymentId
        - accountId
        - amount
        - currency
        - status
    PaymentRequest:
      type: object
      properties:
        accountId:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        reference:
          type: string
      required:
        - accountId
        - amount
        - currency
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
  responses:
    BadRequest:
      description: Invalid input data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'